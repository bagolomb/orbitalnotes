version: "3.9"

services:

  # -------------------------------
  # PostgreSQL Database
  # -------------------------------
  db:
    image: postgres:15
    container_name: orbitalnotes-db
    environment:
      POSTGRES_USER: notes_user
      POSTGRES_PASSWORD: notes_pass
      POSTGRES_DB: notes_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes_user -d notes_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------
  # FastAPI Backend
  # -------------------------------
  backend:
    build:
      context: ./backend  # Dockerfile is expected as ./backend/Dockerfile
    container_name: orbitalnotes-backend
    working_dir: /app
    command: uvicorn app.api:api --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://notes_user:notes_pass@db:5432/notes_db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------------
  # Frontend (Vite/Svelte)
  # -------------------------------
  frontend:
    build:
      context: ./frontend  # Dockerfile is expected as ./frontend/Dockerfile
    container_name: orbitalnotes-frontend
    working_dir: /app
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://backend:8000
      NODE_ENV: development
    depends_on:
      backend:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# -------------------------------
# Named Volumes
# -------------------------------
volumes:
  pg_data:

# -------------------------------
# Custom Network
# -------------------------------
networks:
  default:
    name: orbitalnotes-network
